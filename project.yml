name: Bayan
options:
  bundleIdPrefix: com.bayan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: X6EHA8FBWH
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.1"


targets:
  Bayan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bayan
    resources:
      - path: Bayan/Resources
    settings:
      base:
        INFOPLIST_FILE: Bayan/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mostafamahdi.bayan
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB

  BayanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BayanTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Bayan
