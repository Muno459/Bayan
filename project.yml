name: Bayan
options:
  bundleIdPrefix: com.bayan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.1"
  whisperkit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.12.0"

targets:
  Bayan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bayan
    resources:
      - path: Bayan/Resources
    settings:
      base:
        INFOPLIST_FILE: Bayan/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bayan.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB
      - package: whisperkit
        product: WhisperKit
    entitlements:
      path: Bayan/App/Bayan.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  BayanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BayanTests
    dependencies:
      - target: Bayan
